version: '3.8'

services:
  # ============================================================================
  # MySQL Database
  # ============================================================================
  db:
    image: mysql:8.0
    container_name: iris_ve_db
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: iris_ve
      MYSQL_USER: iris_user
      MYSQL_PASSWORD: iris_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s
    networks:
      - iris_network
    restart: unless-stopped

  # ============================================================================
  # MinIO Object Storage (S3-compatible) — opzionale
  # Console web: http://localhost:9001  (user: minioadmin / pass: minioadmin)
  # Per usarlo: imposta STORAGE_BACKEND=minio nel file env
  # ============================================================================
  minio:
    image: minio/minio:latest
    container_name: iris_ve_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin_secret_change_me
    ports:
      - "9000:9000"    # S3 API
      - "9001:9001"    # Console web
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - iris_network
    restart: unless-stopped
    profiles:
      - minio  # Avvia solo con: docker compose --profile minio up

  # ============================================================================
  # Flask Application
  # ============================================================================
  app:
    build: .
    container_name: iris_ve_app
    env_file:
      - env
    environment:
      FLASK_APP: app.py
      DATABASE_URL: mysql+pymysql://iris_user:iris_password@db:3306/iris_ve
      ENV: production
      FTP_ENABLED: "False"
      EXTERNAL_PORT: "25565"
      ALLOWED_ORIGINS: "*"
      # ── Storage backend ──────────────────────────────────────────────────────
      # local   = filesystem (default, retrocompatibile)
      # minio   = MinIO container sopra
      # s3      = AWS S3, Cloudflare R2, Backblaze B2 (imposta endpoint/keys)
      STORAGE_BACKEND: "local"
      # ── MinIO / S3 (attivi solo se STORAGE_BACKEND != local) ─────────────────
      S3_ENDPOINT_URL: "http://minio:9000"       # lascia vuoto per AWS S3
      S3_BUCKET: "iris-ve"
      S3_ACCESS_KEY: "minioadmin"
      S3_SECRET_KEY: "minioadmin_secret_change_me"
      S3_REGION: "us-east-1"
      S3_PRESIGN_EXPIRY: "3600"
      # S3_PUBLIC_DOMAIN: "https://cdn.tuodominio.com"  # opzionale: CDN/dominio pubblico
    ports:
      - "5000:5000"
      - "25565:5000"
    volumes:
      - ./uploads:/app/uploads
      - ./backups:/app/backups
      - ./logs:/app/logs
      - ./static:/app/static
      - ./templates:/app/templates
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - iris_network
    restart: unless-stopped

  # ============================================================================
  # Nginx Reverse Proxy
  # ============================================================================
  nginx:
    image: nginx:alpine
    container_name: iris_ve_nginx
    ports:
      - "80:80"
      # Uncomment when SSL is configured:
      # - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # Uncomment when SSL certs are placed in ./ssl/:
      # - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - iris_network
    restart: unless-stopped

  # ============================================================================
  # FTP Server
  # Nota: FTP funziona SOLO con STORAGE_BACKEND=local
  # ============================================================================
  ftp:
    build: .
    container_name: iris_ve_ftp
    command: >
      python -c "
      import sys, os;
      sys.path.insert(0, '/app');
      os.chdir('/app');
      from app import start_ftp_server;
      start_ftp_server()
      "
    env_file:
      - env
    environment:
      DATABASE_URL: mysql+pymysql://iris_user:iris_password@db:3306/iris_ve
      ENV: production
      FTP_ENABLED: "True"
      FTP_PORT: "2121"
    ports:
      - "2121:2121"
      - "60000-60100:60000-60100"
    volumes:
      - ./uploads:/app/uploads
    networks:
      - iris_network
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
  minio_data:  # Persiste i file di MinIO

networks:
  iris_network:
    driver: bridge
