# IRIS-VE v2.0 Nginx Configuration
# Ottimizzato per Apple-inspired design e performance

server {
    listen 80;
    server_name your-domain.com;

    # Redirect HTTP a HTTPS (raccomandato per produzione)
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-domain.com;

    # SSL Configuration (aggiorna con i tuoi certificati)
    ssl_certificate /path/to/your/certificate.crt;
    ssl_private_key /path/to/your/private.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Upload file size - 500MB per IRIS-VE
    client_max_body_size 500M;
    client_body_timeout 300s;
    client_header_timeout 300s;

    # Compression per performance
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json
        image/svg+xml;

    # Security headers (Apple-grade security)
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' fonts.googleapis.com; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src 'self' fonts.gstatic.com; img-src 'self' data:;" always;

    # IRIS-VE Application
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;

        # Timeout settings per upload grandi
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    # File statici (se implementati in futuro)
    location /static/ {
        alias /path/to/iris-ve/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options nosniff;

        # Compressione per file statici
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Apple-specific optimizations
    location /apple-touch-icon.png {
        alias /path/to/iris-ve/static/apple-touch-icon.png;
        expires 1y;
    }

    location /favicon.ico {
        alias /path/to/iris-ve/static/favicon.ico;
        expires 1y;
    }

    # Health check endpoint (per load balancer)
    location /health {
        proxy_pass http://127.0.0.1:5000/health;
        access_log off;
    }

    # API endpoints con rate limiting
    location ~* ^/api/ {
        limit_req zone=api burst=10 nodelay;
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Blocca accesso a file sensibili
    location ~* \.(sql|log|bak|backup|conf)$ {
        deny all;
        return 404;
    }

    # Blocca directory sensibili
    location ~* /(\.git|\.env|venv|__pycache__|\.py$) {
        deny all;
        return 404;
    }
}

# Rate limiting zones
http {
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=general:10m rate=100r/m;

    # Log format personalizzato per IRIS-VE
    log_format iris_ve_format '$remote_addr - $remote_user [$time_local] '
                              '"$request" $status $body_bytes_sent '
                              '"$http_referer" "$http_user_agent" '
                              '$request_time $upstream_response_time';

    access_log /var/log/nginx/iris_ve_access.log iris_ve_format;
    error_log /var/log/nginx/iris_ve_error.log warn;
}

# Installazione:
# 1. sudo cp nginx.conf /etc/nginx/sites-available/iris-ve
# 2. sudo ln -s /etc/nginx/sites-available/iris-ve /etc/nginx/sites-enabled/
# 3. sudo nginx -t
# 4. sudo systemctl reload nginx
