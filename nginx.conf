user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_tokens   off;  # Hide nginx version

    # Upload size — coerente con Flask MAX_CONTENT_LENGTH (15 GB)
    client_max_body_size 15G;
    client_body_timeout  600s;
    client_header_timeout 60s;
    proxy_read_timeout   600s;
    proxy_send_timeout   600s;
    proxy_connect_timeout 10s;

    # Proxy buffer — disabilita buffering per streaming/upload grandi
    proxy_buffering         off;
    proxy_request_buffering off;
    proxy_buffer_size       16k;
    proxy_busy_buffers_size 32k;

    # Gzip compression
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        image/svg+xml;

    # Rate limiting zones (defined at http level, not server level)
    limit_req_zone $binary_remote_addr zone=upload:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=api:10m    rate=60r/m;
    limit_req_zone $binary_remote_addr zone=login:10m  rate=10r/m;

    # =========================================================================
    # Upstream Flask app con keepalive
    # =========================================================================
    upstream flask_app {
        server app:5000;
        keepalive 32;
    }

    # =========================================================================
    # HTTP Server (port 80)
    # NOTE: SSL/HTTPS is not enabled because certificates are not configured.
    # To enable HTTPS:
    #   1. Place cert.pem and key.pem in ./ssl/
    #   2. Uncomment the HTTPS server block below
    #   3. Uncomment the HTTP→HTTPS redirect
    #   4. Comment out this HTTP server block
    # =========================================================================
    server {
        listen 80;
        server_name _;

        # Security headers (HTTP-safe subset — no HSTS without HTTPS)
        add_header X-Frame-Options        "SAMEORIGIN"                always;
        add_header X-Content-Type-Options "nosniff"                   always;
        add_header X-XSS-Protection       "1; mode=block"             always;
        add_header Referrer-Policy        "no-referrer-when-downgrade" always;
        add_header X-Robots-Tag           "noindex, nofollow"         always;

        # Block sensitive file access at nginx level
        location ~* \.(sql|log|bak|env|ini|conf|cfg)$ {
            deny all;
            return 404;
        }

        # Block dot-files (e.g. .env, .git)
        location ~ /\. {
            deny all;
            return 404;
        }

        # Health check — no rate limit, no auth (for monitoring)
        location = /health {
            proxy_pass http://flask_app/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 10s;
            access_log off;
        }

        # WebSocket (Flask-SocketIO) — richiede upgrade HTTP
        location /socket.io/ {
            proxy_pass http://flask_app/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;   # 24h — connessioni WS long-lived
            proxy_send_timeout 86400s;
        }

        # Login — stricter rate limit
        location = /login {
            limit_req zone=login burst=5 nodelay;
            proxy_pass http://flask_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Upload endpoint — strict rate limit e timeout estesi per file grandi
        location ~* ^/api/folders/[0-9]+/upload {
            limit_req zone=upload burst=5 nodelay;
            proxy_pass http://flask_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 15G;
            proxy_read_timeout   1800s;  # 30 min per upload da 15 GB
            proxy_send_timeout   1800s;
            proxy_request_buffering off;
        }

        # API endpoints — standard rate limit
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://flask_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Static files — long cache, serviti direttamente se possibile
        location /static/ {
            proxy_pass http://flask_app/static/;
            proxy_set_header Host $host;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Everything else
        location / {
            proxy_pass http://flask_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_redirect off;
        }
    }

    # =========================================================================
    # HTTPS Server (port 443) — DISABLED until SSL certs are configured
    # Uncomment this block and the HTTP redirect above once you have certs.
    # =========================================================================
    #
    # server {
    #     listen 443 ssl http2;
    #     server_name _;
    #
    #     ssl_certificate     /etc/nginx/ssl/cert.pem;
    #     ssl_certificate_key /etc/nginx/ssl/key.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers on;
    #     ssl_session_cache   shared:SSL:10m;
    #     ssl_session_timeout 10m;
    #
    #     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    #     add_header X-Frame-Options        "SAMEORIGIN" always;
    #     add_header X-Content-Type-Options "nosniff" always;
    #     add_header X-XSS-Protection       "1; mode=block" always;
    #     add_header Referrer-Policy        "no-referrer-when-downgrade" always;
    #
    #     # ... (same location blocks as HTTP server above)
    # }
}
